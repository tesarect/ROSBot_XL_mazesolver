maze_solver_node:
  ros__parameters:
  
    use_sim_time: false
    base_link: "base_link"
    laser_link: "laser"

    num_waypoints: -1 # all waypoints
    odom_topic: "/odometry/filtered"
    laser_topic: "/scan"
    laser_offset_deg: 0.0
    # waypoint_file: "/home/user/ros2_ws/src/ROSBot_XL_mazesolver/resources/waypoints/real_waypoints.yaml"

    # PID gain
    # Distance Controller
    DkP: 0.27
    DkI: 0.001
    DkD: 0.23
    # Turn Controller
    TkP: 0.8
    TkI: 0.005
    TkD: 0.5

    max_ang_vel: 0.2
    max_lin_vel: 0.5

    yaw_tolerance: 0.01         # rad
    goal_tolerance: 0.05

    front_stop_thresh: 0.25
    wall_nudge_thresh: 0.20
    nudge_gain: 0.05
    front_corr_thresh: 0.16
    side_corr_thresh: 0.20
    tilt_thresh: 0.015
    tilt_gain: 1.0
    correction_timeout: 200