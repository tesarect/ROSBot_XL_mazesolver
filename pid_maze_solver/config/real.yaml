maze_solver_node:
  ros__parameters:
  
    use_sim_time: false
    base_link: "base_link"
    laser_link: "laser"

    num_waypoints: -1 # all waypoints
    odom_topic: "/odometry/filtered"
    laser_topic: "/scan"
    laser_offset_deg: 0.0
    # waypoint_file: "/home/user/ros2_ws/src/ROSBot_XL_mazesolver/resources/waypoints/real_waypoints.yaml"

    # PID gain
    # Distance Controller
    # DkP: 0.27
    # DkI: 0.001
    # DkD: 0.23
    # DkP: 0.77
    # DkI: 0.001
    # DkD: 0.25
    # DkP: 0.45
    # DkI: 0.001
    # DkD: 0.14
    #-------------------------

    DkP: 0.35
    DkI: 0.001
    DkD: 0.10
    # DkP: 1.2
    # DkI: 0.001
    # DkD: 0.5
    # Turn Controller
    TkP: 0.8
    TkI: 0.005
    TkD: 0.5
    #-------------------------
    # TkP: 3.0
    # # TkI: 0.0001
    # TkI: 0.005
    # # TkD: 1.9
    # TkD: 1.4

    max_ang_vel: 0.5      # >> .5 >> .2
    max_lin_vel: 0.4
    min_vx: 0.09          # tune up if robot still stalls

    yaw_tolerance: 0.01         # rad
    goal_tolerance: 0.08        # >> 9

    front_stop_thresh: 0.22 # 0.25   -----------------
    front_corr_thresh: 0.21 # 0.23   -----------------
    early_stop_dist: 0.06   # << .24 

    wall_nudge_thresh: 0.18     # while MOVING    >> .23
    back_nudge_thresh: 0.25     # back arc avg distance to trigger forward push
    nudge_gain: 0.05  # <<

    wheel_corner_thresh: 0.30   # any body corner closer than this → nudge away

    side_corr_thresh: 0.20      # while CORRECTION
    
    parallel_thresh: 0.02
    parallel_wall_max: 0.40
    parallel_timeout: 10      # >> 30
    parallel_gain: 0.8
    corner_thresh: 0.12

    tilt_correction: false
    tilt_thresh: 0.015
    tilt_gain: 1.0
    correction_timeout: 200

    heading_hold_kP:     1.5   # how aggressively to correct yaw drift
    heading_hold_max_wz: 0.5   # cap so it doesn't fight the odom PID

    wall_pid_kP:       1.0    # lateral P gain
    wall_pid_target:   0.25   # desired distance from wall (metres)
    wall_pid_max_vy:   0.15   # max lateral correction
    wall_pid_max_dist: 0.50   # only engage if wall within this distance

    DkD_lat: 0.0          # add — keep lateral D at zero, derivative spikes on real hw
    DkD: 0.10             # forward D only, can keep some