maze_solver_node:
  ros__parameters:
  
    use_sim_time: true
    base_link: "base_link"
    laser_link: "laser"

    num_waypoints: -1             # (-1 all) waypoints
    odom_topic: "/odometry/filtered"
    laser_topic: "/scan"
    laser_offset_deg: 180.0  # 0.0 / 180.0
    # waypoint_file: "/home/user/ros2_ws/src/ROSBot_XL_mazesolver/resources/waypoints/sim_waypoints.yaml"

    # PID gain
    # Distance Controller
    # DkP: 0.6
    # DkI: 0.01
    # DkD: 1.1
    DkP: 1.4
    DkI: 0.0001
    DkD: 0.8 #0.7 #1.0
    # Turn Controller
    # TkP: 3.0
    # TkI: 0.0001
    # TkD: 2.0
    TkP: 3.0 #3.5
    TkI: 0.0001
    TkD: 2.8 #2.5 #1.0 #2.0

    min_ang_vel: 0.3
    max_ang_vel: 1.5

    min_lin_vel: 0.2
    max_lin_vel: 3.0

    odom_drift_threshold: 0.05  # 5cm
    yaw_tolerance: 0.01         # rad
    goal_tolerance: 0.03