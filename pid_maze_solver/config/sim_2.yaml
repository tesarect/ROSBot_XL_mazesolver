maze_solver_node:
  ros__parameters:

    # ── Topics ────────────────────────────────────────────────────────────
    odom_topic:  "/odometry/filtered"
    laser_topic: "/scan"
    imu_topic:   "imu_broadcaster/imu"

    # ── Waypoint loading ──────────────────────────────────────────────────
    num_waypoints: -1        # -1 = load all waypoints

    # ── Distance PID ──────────────────────────────────────────────────────
    # D-term uses odom body-frame velocity (not position diff).
    # Sim can handle higher gains — real robot needs lower values.
    pid_x_kp: 2.5
    pid_x_ki: 0.005
    pid_x_kd: 0.3

    pid_y_kp: 2.5
    pid_y_ki: 0.005
    pid_y_kd: 0.3

    # ── Yaw PID ───────────────────────────────────────────────────────────
    # D-term uses IMU yaw-rate (not odom yaw diff).
    pid_yaw_kp: 1.3
    pid_yaw_ki: 0.001
    pid_yaw_kd: 0.3

    # ── Velocity limits ───────────────────────────────────────────────────
    max_linear_vel:  0.8     # m/s  (ROSBot XL spec: 0.8)
    max_angular_vel: 3.14    # rad/s (ROSBot XL spec: 3.14)

    # ── Goal tolerances ───────────────────────────────────────────────────
    linear_tolerance:      0.01   # metres — position close enough
    angular_tolerance:     0.01   # rad    — heading close enough
    linear_vel_tolerance:  0.01   # m/s    — also nearly stopped
    angular_vel_tolerance: 0.02   # rad/s  — also nearly stopped (from IMU)

    # ── Pause between waypoints ───────────────────────────────────────────
    # Ticks = pause_duration_sec × 20 Hz
    # Implemented as a tick counter — does NOT block the timer thread.
    pause_duration_sec: 1.5

    # ── Obstacle avoidance ────────────────────────────────────────────────
    # Checks beams within ±front_angle_deg of the current motion direction.
    stop_distance:   0.20    # m — zero velocity immediately
    slow_distance:   0.50    # m — begin proportional slowdown
    front_angle_deg: 30.0    # ±degrees around motion direction

    # ── Laser frame ───────────────────────────────────────────────────────
    # Offset between laser frame and base_link.
    # 180° = laser is mounted pointing backwards on ROSBot XL.
    laser_yaw_deg: 180.0

    # ── Antenna self-echo filter ──────────────────────────────────────────
    # ROSBot XL rear antenna produces false laser returns close to the robot.
    # Beams near antenna_center_deg within ±antenna_half_width_deg that
    # read closer than antenna_max_range are suppressed.
    antenna_center_deg:      -161.0   # sim antenna position
    antenna_half_width_deg:     9.0
    antenna_max_range:          0.21

    # ── Anti-drift ────────────────────────────────────────────────────────
    # At end of each MOVE: if yaw drifted more than threshold from target,
    # add that drift to the next waypoint's dyaw to compensate.
    anti_drift:              false    # off in sim (sim odom is accurate)
    yaw_drift_threshold_deg:   5.0